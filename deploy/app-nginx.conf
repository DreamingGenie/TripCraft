# 컨테이너 내부 nginx — HTTP only(:80). TLS·도메인은 호스트 nginx가 종단하고
# 이 컨테이너로 프록시한다(호스트 nginx → 도커호스트:${APP_PORT} → 여기). envsubst 불필요.
# 역할: 정적 dist(SPA) 서빙 + /api·/uploads·/ws 를 backend 컨테이너로 프록시.

server {
    listen 80;
    server_name _;

    client_max_body_size 11m;   # 멀티파트 업로드 10MB + 여유 (호스트 hop 에도 동일 설정 필요)

    root /usr/share/nginx/html;
    index index.html;

    # REST API
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 업로드 이미지(백엔드가 서빙)
    location /uploads/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # 실시간 협업 WebSocket(STOMP/SockJS) — 업그레이드 헤더 필수
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # 협업 연결 장기 유지
    }

    # SPA 폴백(Vue Router history 모드)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
