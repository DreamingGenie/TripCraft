# 온프레미스 단일 호스트 — mysql + backend + nginx(SPA+프록시)
# 실행: deploy/ 에서 `docker compose up -d --build`
# 변수: deploy/.env (compose 인터폴레이션), deploy/backend-secrets.env (백엔드 시크릿)

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
      # 최초 기동 시 순서대로 자동 적용: 01 통합 스키마(마이그 다 반영된 정본) → 02 관광지 데이터 시드
      - ../docs/02_design/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./seed/02-attraction-seed.sql.gz:/docker-entrypoint-initdb.d/02-attraction-seed.sql.gz:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      UPLOAD_DIR: /app/uploads
      SPRING_PROFILES_ACTIVE: prod   # 운영 로깅(INFO) 활성 — application-prod.yml
      TZ: Asia/Seoul
    env_file:
      - ./backend-secrets.env   # JWT·외부 API 키·KAKAO_* (KAKAO_REDIRECT_URI 도메인 일치)
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    # 주의: in-memory STOMP 브로커 → 백엔드는 단일 인스턴스만(replicas 금지)

  nginx:
    build:
      context: ../frontend     # 멀티스테이지: dist 빌드 후 nginx 서빙
    depends_on:
      - backend
    # TLS/도메인 없음 — 호스트 nginx가 종단하고 도커호스트:${APP_PORT} 로 프록시(README 참고).
    # 외부에 여는 유일한 포트. backend·mysql 은 내부망 전용(노출 X).
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./app-nginx.conf:/etc/nginx/conf.d/default.conf:ro   # HTTP 전용 라우팅(SPA + /api·/uploads·/ws)
    restart: unless-stopped

volumes:
  mysql-data:
  uploads:
