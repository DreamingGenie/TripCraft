spring:
  application:
    name: tripcraft

  batch:
    jdbc:
      initialize-schema: always  # BATCH_JOB_INSTANCE 등 메타테이블 자동 생성
    job:
      enabled: false             # 애플리케이션 시작 시 Job 자동 실행 방지

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Spring AI — gms(OpenAI 호환 프록시). 키는 .env의 GMS_KEY로 주입
  ai:
    openai:
      api-key: ${GMS_KEY}
      base-url: https://gms.ssafy.io/gmsapi/api.openai.com
      chat:
        options:
          model: gpt-4.1
          temperature: 0.7

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 1800000    # 30분 (ms)
  refresh-token-expiry: 604800000 # 7일 (ms)

tour-api:
  service-key: ${TOUR_API_KEY}
  base-url: https://apis.data.go.kr/B551011/KorService2

odsay:
  api-key: ${ODSAY_API_KEY}

tmap:
  api-key: ${TMAP_API_KEY}
  base-url: https://apis.openapi.sk.com/tmap

kakao:
  client-id: ${KAKAO_CLIENT_ID:}                # 카카오 REST API 키 (지도 JS 키와 별개). 미설정 시 카카오 로그인만 비활성
  client-secret: ${KAKAO_CLIENT_SECRET:}        # 콘솔에서 사용 설정한 경우만, 없으면 빈 값
  redirect-uri: ${KAKAO_REDIRECT_URI:}          # 카카오 앱에 등록한 Redirect URI와 일치
  token-url: https://kauth.kakao.com/oauth/token
  user-info-url: https://kapi.kakao.com/v2/user/me

upload:
  dir: ${UPLOAD_DIR:./uploads}   # 이미지 업로드 저장 경로 (기본: 실행 디렉토리 하위)

logging:
  level:
    com.tripcraft: DEBUG
