spring:
  application:
    name: tripcraft

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 1800000    # 30분 (ms)
  refresh-token-expiry: 604800000 # 7일 (ms)

tour-api:
  service-key: ${TOUR_API_KEY}
  base-url: https://apis.data.go.kr/B551011/KorService2

tmap:
  api-key: ${TMAP_API_KEY}

logging:
  level:
    com.tripcraft: DEBUG
