<svg viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="화면 M — 일정 생성 모달 와이어프레임">
  <style>
    .bg{fill:#F5F4F0} .dim{fill:#2C2C2A;opacity:0.35} .surface{fill:#FFFFFF} .bd{fill:none;stroke:#D3D1C7;stroke-width:1}
    .tx{fill:#2C2C2A;font-size:13px} .mut{fill:#888780;font-size:12px}
    .lbl{fill:#5F5E5A;font-size:11px;font-weight:700}
    .btn{fill:#534AB7} .btntx{fill:#FFFFFF;font-size:13px;font-weight:600}
    .ghost{fill:#FFFFFF;stroke:#D3D1C7;stroke-width:1} .ghosttx{fill:#5F5E5A;font-size:13px}
    .step{fill:#EEEDFE} .steptx{fill:#534AB7;font-size:12px;font-weight:600}
    .cap{fill:#2C2C2A;font-size:14px;font-weight:700}
  </style>
  <rect class="bg" x="0" y="0" width="800" height="560"/>
  <text class="cap" x="24" y="30">«화면 M» 일정 생성 모달 — ScheduleModal</text>
  <!-- dimmed backdrop -->
  <rect class="dim" x="24" y="44" width="752" height="496" rx="6"/>
  <!-- modal -->
  <rect class="surface" x="220" y="92" width="360" height="400" rx="12"/>
  <text class="tx" x="248" y="132" font-size="16" font-weight="700">새 여행 일정 만들기</text>
  <text x="552" y="132" class="mut" font-size="16">✕</text>
  <line x1="220" y1="148" x2="580" y2="148" stroke="#ECEAE3"/>
  <text class="lbl" x="248" y="184">여행 제목</text>
  <rect class="surface" x="248" y="192" width="304" height="36" rx="6"/><rect class="bd" x="248" y="192" width="304" height="36" rx="6"/>
  <text class="mut" x="262" y="215">예) 제주 3박4일</text>
  <text class="lbl" x="248" y="256">여행 기간</text>
  <rect class="surface" x="248" y="264" width="146" height="36" rx="6"/><rect class="bd" x="248" y="264" width="146" height="36" rx="6"/><text class="mut" x="262" y="287">시작일 📅</text>
  <rect class="surface" x="406" y="264" width="146" height="36" rx="6"/><rect class="bd" x="406" y="264" width="146" height="36" rx="6"/><text class="mut" x="420" y="287">종료일 📅</text>
  <text class="lbl" x="248" y="328">인원</text>
  <rect class="surface" x="248" y="336" width="304" height="36" rx="6"/><rect class="bd" x="248" y="336" width="304" height="36" rx="6"/>
  <text class="tx" x="262" y="359">－   2 명   ＋</text>
  <!-- actions -->
  <rect class="ghost" x="248" y="420" width="146" height="42" rx="6"/><text class="ghosttx" x="321" y="446" text-anchor="middle">취소</text>
  <rect class="btn" x="406" y="420" width="146" height="42" rx="6"/><text class="btntx" x="479" y="446" text-anchor="middle">만들기</text>
</svg>
