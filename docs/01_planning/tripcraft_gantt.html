<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripCraft — WBS Gantt Chart (6주)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: #f5f4f0;
    color: #2c2c2a;
    min-height: 100vh;
    padding: 40px 24px;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    border: 0.5px solid #d3d1c7;
    padding: 36px 40px 40px;
  }

  .title-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 6px;
  }
  h1 {
    font-size: 22px;
    font-weight: 500;
    color: #2c2c2a;
  }
  .badge {
    font-size: 11px;
    font-weight: 500;
    background: #EEEDFE;
    color: #534AB7;
    border: 0.5px solid #534AB7;
    border-radius: 6px;
    padding: 2px 8px;
  }
  .meta {
    font-size: 13px;
    color: #888780;
    margin-bottom: 28px;
  }

  /* Gantt table */
  .gc-table {
    width: 100%;
    border-collapse: collapse;
  }
  .gc-table th {
    font-size: 11px;
    font-weight: 500;
    color: #888780;
    text-align: center;
    padding: 6px 4px 10px;
    border-bottom: 0.5px solid #b4b2a9;
  }
  .gc-table th.label-col {
    text-align: left;
    width: 200px;
    padding-left: 4px;
  }
  .gc-table td {
    padding: 0;
    vertical-align: middle;
  }
  .gc-table td.label-col {
    padding: 0 8px 0 4px;
  }
  .task-name {
    font-size: 12px;
    color: #2c2c2a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 192px;
    padding: 5px 0;
  }
  .task-name.phase {
    font-size: 13px;
    font-weight: 500;
    padding-top: 10px;
  }
  .task-name.sub {
    color: #5f5e5a;
    padding-left: 12px;
  }

  .gc-cell {
    position: relative;
    height: 28px;
  }
  .gc-cell .grid-line {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 0.5px;
    background: #d3d1c7;
    opacity: 0.5;
  }
  .gc-bar {
    position: absolute;
    top: 6px;
    height: 16px;
    border-radius: 4px;
    transition: opacity 0.15s;
  }
  .gc-bar:hover { opacity: 0.75; }

  /* phase row top spacing */
  tr.phase-row td { padding-top: 6px; }

  /* Milestone row */
  .milestone-section {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 0.5px solid #d3d1c7;
    display: grid;
    grid-template-columns: 200px repeat(6, 1fr);
    gap: 0;
    align-items: start;
  }
  .milestone-label-col {
    font-size: 11px;
    color: #888780;
    font-weight: 500;
    padding: 4px 4px 0;
  }
  .milestone-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 4px 2px 0;
  }
  .diamond {
    width: 10px;
    height: 10px;
    transform: rotate(45deg);
    border-radius: 1px;
    flex-shrink: 0;
  }
  .milestone-text {
    font-size: 10px;
    color: #888780;
    text-align: center;
    line-height: 1.3;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 0.5px solid #d3d1c7;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #888780;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .footer {
    margin-top: 28px;
    font-size: 11px;
    color: #b4b2a9;
    text-align: right;
  }
</style>
</head>
<body>
<div class="container">
  <div class="title-row">
    <h1>TripCraft</h1>
    <span class="badge">WBS v0.1</span>
  </div>
  <p class="meta">6주 개발 일정 · 2인 팀 · 2026.05 초안</p>

  <table class="gc-table" id="gantt"></table>

  <div class="milestone-section" id="milestones"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#CECBF6;border:0.5px solid #534AB7"></div> 기획</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9FE1CB;border:0.5px solid #0F6E56"></div> 설계</div>
    <div class="legend-item"><div class="legend-dot" style="background:#B5D4F4;border:0.5px solid #185FA5"></div> 백엔드</div>
    <div class="legend-item"><div class="legend-dot" style="background:#F4C0D1;border:0.5px solid #993556"></div> 프론트엔드</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FAC775;border:0.5px solid #854F0B"></div> QA·배포</div>
    <div class="legend-item"><div class="legend-dot" style="background:#534AB7;transform:rotate(45deg);border-radius:1px"></div> 마일스톤</div>
  </div>

  <p class="footer">본 문서는 기획 초안으로 설계·개발 진행 과정에서 지속적으로 업데이트됩니다.</p>
</div>

<script>
const WEEKS = 6;
const WEEK_LABELS = ["W1 기획","W2 설계","W3 개발","W4 개발","W5 개발","W6 QA·배포"];

const tasks = [
  /* ── 1단계: 기획 ── */
  { name: "1단계 — 기획", type: "phase", start: 1, end: 1, color: "#534AB7", bg: "#CECBF6" },
  { name: "요구사항 정의", type: "sub", start: 1, end: 1, color: "#534AB7", bg: "#EEEDFE" },
  { name: "WBS 작성", type: "sub", start: 1, end: 1, color: "#534AB7", bg: "#EEEDFE" },
  { name: "GitLab / 환경 세팅", type: "sub", start: 1, end: 1, color: "#534AB7", bg: "#EEEDFE" },

  /* ── 2단계: 설계 ── */
  { name: "2단계 — 설계", type: "phase", start: 2, end: 2, color: "#0F6E56", bg: "#9FE1CB" },
  { name: "ERD 설계", type: "sub", start: 2, end: 2, color: "#0F6E56", bg: "#E1F5EE" },
  { name: "API 명세", type: "sub", start: 2, end: 2, color: "#0F6E56", bg: "#E1F5EE" },
  { name: "UI 와이어프레임", type: "sub", start: 2, end: 2, color: "#0F6E56", bg: "#E1F5EE" },
  { name: "개발 환경 세팅 (BE+FE)", type: "sub", start: 2, end: 2, color: "#0F6E56", bg: "#E1F5EE" },

  /* ── 3단계: 개발 ── */
  { name: "3단계 — 개발", type: "phase", start: 3, end: 5, color: "#185FA5", bg: "#B5D4F4" },

  /* W3: 회원 + 관광지 기반 */
  { name: "F10 회원 관리 (BE)", type: "sub", start: 3, end: 3, color: "#185FA5", bg: "#E6F1FB" },
  { name: "F10 회원 관리 (FE)", type: "sub", start: 3, end: 3, color: "#993556", bg: "#FBEAF0" },
  { name: "F01-03 관광지 DB 구축 (BE)", type: "sub", start: 3, end: 3, color: "#185FA5", bg: "#E6F1FB" },
  { name: "F01-03 관광지 조회 (FE)", type: "sub", start: 3, end: 3, color: "#993556", bg: "#FBEAF0" },
  { name: "F04 즐겨찾기 (BE+FE)", type: "sub", start: 3, end: 3, color: "#185FA5", bg: "#E6F1FB" },

  /* W4: 일정 기능 */
  { name: "F05-07 일정 블록·저장 (BE)", type: "sub", start: 4, end: 4, color: "#185FA5", bg: "#E6F1FB" },
  { name: "F05-07 일정 블록·저장 (FE)", type: "sub", start: 4, end: 4, color: "#993556", bg: "#FBEAF0" },
  { name: "F06 ODsay 이동시간 연동", type: "sub", start: 4, end: 4, color: "#185FA5", bg: "#E6F1FB" },

  /* W5: 커뮤니티 + 버퍼 */
  { name: "F08-09 커뮤니티 (BE)", type: "sub", start: 5, end: 5, color: "#185FA5", bg: "#E6F1FB" },
  { name: "F08-09 커뮤니티 (FE)", type: "sub", start: 5, end: 5, color: "#993556", bg: "#FBEAF0" },
  { name: "기능 연결·버그 버퍼", type: "sub", start: 5, end: 5, color: "#185FA5", bg: "#E6F1FB" },

  /* ── 4단계: QA·배포 ── */
  { name: "4단계 — QA·배포", type: "phase", start: 6, end: 6, color: "#854F0B", bg: "#FAC775" },
  { name: "통합 테스트·버그수정", type: "sub", start: 6, end: 6, color: "#854F0B", bg: "#FAEEDA" },
  { name: "배포 및 문서 마무리", type: "sub", start: 6, end: 6, color: "#854F0B", bg: "#FAEEDA" },
];

const milestones = [
  { week: 2, color: "#534AB7", label: "M1\n설계완료" },
  { week: 3, color: "#0F6E56", label: "M2\n회원·관광지" },
  { week: 4, color: "#185FA5", label: "M3\n일정완성" },
  { week: 5, color: "#993556", label: "M4\nMVP완성" },
  { week: 6, color: "#854F0B", label: "M5\n배포완료" },
];

// Build header
const table = document.getElementById('gantt');
const thead = document.createElement('thead');
const headerRow = document.createElement('tr');
const th0 = document.createElement('th');
th0.className = 'label-col';
th0.textContent = '작업';
headerRow.appendChild(th0);
WEEK_LABELS.forEach(label => {
  const th = document.createElement('th');
  const parts = label.split(' ');
  th.innerHTML = parts[0] + '<br><span style="font-weight:400;opacity:0.7">' + parts[1] + '</span>';
  headerRow.appendChild(th);
});
thead.appendChild(headerRow);
table.appendChild(thead);

// Build body
const tbody = document.createElement('tbody');
tasks.forEach(task => {
  const tr = document.createElement('tr');
  if (task.type === 'phase') tr.className = 'phase-row';

  const tdLabel = document.createElement('td');
  tdLabel.className = 'label-col';
  const nameDiv = document.createElement('div');
  nameDiv.className = 'task-name' + (task.type === 'phase' ? ' phase' : ' sub');
  nameDiv.textContent = task.name;
  nameDiv.title = task.name;
  tdLabel.appendChild(nameDiv);
  tr.appendChild(tdLabel);

  for (let w = 1; w <= WEEKS; w++) {
    const td = document.createElement('td');
    const cell = document.createElement('div');
    cell.className = 'gc-cell';
    const grid = document.createElement('div');
    grid.className = 'grid-line';
    cell.appendChild(grid);

    if (w >= task.start && w <= task.end) {
      const bar = document.createElement('div');
      bar.className = 'gc-bar';
      const pad = 5;
      const isFirst = w === task.start;
      const isLast = w === task.end;
      const span = task.end - task.start + 1;
      if (span === 1) {
        bar.style.left = pad + '%';
        bar.style.right = pad + '%';
      } else if (isFirst) {
        bar.style.left = pad + '%';
        bar.style.right = '0';
        bar.style.borderTopRightRadius = '0';
        bar.style.borderBottomRightRadius = '0';
      } else if (isLast) {
        bar.style.left = '0';
        bar.style.right = pad + '%';
        bar.style.borderTopLeftRadius = '0';
        bar.style.borderBottomLeftRadius = '0';
      } else {
        bar.style.left = '0';
        bar.style.right = '0';
        bar.style.borderRadius = '0';
      }
      bar.style.background = task.bg;
      bar.style.border = '0.5px solid ' + task.color;
      cell.appendChild(bar);
    }

    td.appendChild(cell);
    tr.appendChild(td);
  }

  tbody.appendChild(tr);
});
table.appendChild(tbody);

// Build milestones
const msSection = document.getElementById('milestones');
const labelCol = document.createElement('div');
labelCol.className = 'milestone-label-col';
labelCol.textContent = '마일스톤';
msSection.appendChild(labelCol);

for (let w = 1; w <= WEEKS; w++) {
  const cell = document.createElement('div');
  cell.className = 'milestone-cell';
  const ms = milestones.find(m => m.week === w);
  if (ms) {
    const d = document.createElement('div');
    d.className = 'diamond';
    d.style.background = ms.color;
    cell.appendChild(d);
    const lbl = document.createElement('div');
    lbl.className = 'milestone-text';
    lbl.innerHTML = ms.label.replace('\n', '<br>');
    cell.appendChild(lbl);
  }
  msSection.appendChild(cell);
}
</script>
</body>
</html>
